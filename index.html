<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BlockTools</title>
<link rel="icon" type="image/png" href="logo.png">
<link rel="apple-touch-icon" href="logo.png">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg,#c8f0ff,#eef2f6);
  color: #222;
  padding: 20px;
}
h1 { text-align: center; margin-bottom: 30px; color: #1f6feb; text-shadow: 1px 1px 3px #ccc; }
.results {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  max-width: 900px;
  margin: 0 auto;
}
.tool-card {
  background: linear-gradient(135deg,#fff,#f0f8ff);
  border-radius: 12px;
  padding: 20px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.15);
  text-align: center;
  transition: transform 0.2s, box-shadow 0.2s;
}
.tool-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.25); }
.tool-card h3 { color: #1f6feb; margin-bottom: 12px; }
.tool-card a {
  display: inline-block;
  padding: 10px 16px;
  background: #1f6feb;
  color: #fff;
  border-radius: 8px;
  text-decoration: none;
  font-weight: 700;
}
.tool-card a:hover { background: #155ac4; }
@media(max-width:500px){ .results { grid-template-columns: 1fr; gap: 12px; } }
</style>
</head>
<body>

<h1>BlockTools</h1>
<div class="results">
  <div class="tool-card">
    <h3>Stacker</h3>
    <p>Convert items into stacks, chests, and shulkers.</p>
    <a href="Stacker.html">Open</a>
  </div>
  <div class="tool-card">
    <h3>BlockCalc</h3>
    <p>Calculate block counts from coordinate ranges.</p>
    <a href="BlockCalc.html">Open</a>
  </div>
</div>

</body>
</html>
